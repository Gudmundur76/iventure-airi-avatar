<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Velorah — iVenture Studio AI</title>
  <meta name="description" content="Talk to Velorah, the iVenture Studio AI agent. Voice-powered, always available." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000d18;
      --fg: #ffffff;
      --muted: rgba(255,255,255,0.5);
      --accent: #4fc3f7;
      --accent-dim: rgba(79,195,247,0.15);
      --accent-glow: rgba(79,195,247,0.4);
      --font-display: 'Instrument Serif', serif;
      --font-body: 'Inter', sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Portrait Background ── */
    #portrait {
      position: fixed;
      inset: 0;
      background-image: url('https://os.gummi.lt/manus-storage/gummi_avatar_hero_2620b055.png');
      background-size: cover;
      background-position: center top;
      z-index: 0;
    }

    /* ── Dark gradient overlay ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0,13,24,0.3) 0%, rgba(0,13,24,0.0) 30%, rgba(0,13,24,0.0) 50%, rgba(0,13,24,0.85) 75%, rgba(0,13,24,0.97) 100%),
        linear-gradient(to right, rgba(0,13,24,0.4) 0%, transparent 40%, transparent 60%, rgba(0,13,24,0.4) 100%);
      pointer-events: none;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      color: var(--fg);
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    #logo span { color: var(--accent); }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Conversation history (scrollable) ── */
    #conversation {
      position: fixed;
      bottom: 220px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 560px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: none;
    }
    #conversation::-webkit-scrollbar { display: none; }
    .msg {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.55;
      max-width: 90%;
      text-shadow: none;
      animation: msg-in 0.2s cubic-bezier(0.23, 1, 0.32, 1);
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user {
      background: rgba(79,195,247,0.15);
      border: 1px solid rgba(79,195,247,0.25);
      color: #e0f7ff;
      align-self: flex-end;
    }
    .msg.agent {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f0f0f0;
      align-self: flex-start;
    }
    .msg.thinking {
      background: transparent;
      border: none;
      color: var(--muted);
      font-style: italic;
      font-size: 0.8rem;
      align-self: flex-start;
    }

    /* ── Bottom UI ── */
    #bottom-ui {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 20px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* ── Text input row ── */
    #input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 520px;
    }
    #text-input {
      flex: 1;
      background: rgba(0,13,24,0.65);
      border: 1px solid rgba(79,195,247,0.25);
      border-radius: 24px;
      padding: 12px 18px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--fg);
      outline: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }
    #text-input::placeholder { color: var(--muted); }
    #text-input:focus { border-color: var(--accent); }
    #send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(79,195,247,0.3);
      background: rgba(79,195,247,0.12);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s cubic-bezier(0.23, 1, 0.32, 1);
      flex-shrink: 0;
    }
    #send-btn:hover { background: rgba(79,195,247,0.22); border-color: var(--accent); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn svg { width: 18px; height: 18px; }

    /* ── Mic Button ── */
    #mic-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 1.5px solid rgba(79,195,247,0.4);
      background: rgba(0,13,24,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 0 24px rgba(79,195,247,0.1), inset 0 1px 1px rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    #mic-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 32px var(--accent-glow), inset 0 1px 1px rgba(255,255,255,0.15);
      transform: scale(1.05);
    }
    #mic-btn:active { transform: scale(0.96); }
    #mic-btn.listening {
      border-color: var(--accent);
      background: rgba(79,195,247,0.12);
      box-shadow: 0 0 48px var(--accent-glow), 0 0 80px rgba(79,195,247,0.15);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }
    #mic-btn.speaking {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.12);
      box-shadow: 0 0 48px rgba(167,139,250,0.4);
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 48px var(--accent-glow), 0 0 80px rgba(79,195,247,0.15); }
      50% { box-shadow: 0 0 64px var(--accent-glow), 0 0 120px rgba(79,195,247,0.25); }
    }
    #mic-btn svg { width: 24px; height: 24px; }
    #mic-btn.listening svg { color: var(--accent); }
    #mic-btn.speaking svg { color: #a78bfa; }

    /* ── Hint ── */
    #hint {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Contact strip ── */
    #contact {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 16px;
      align-items: center;
      white-space: nowrap;
    }
    #contact a {
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    #contact a:hover { color: var(--accent); }


    /* ── Book a Call CTA ── */
    #book-cta {
      position: fixed;
      top: 18px;
      right: 28px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #book-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(79,195,247,0.5);
      background: rgba(79,195,247,0.12);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-decoration: none;
      transition: all 0.18s cubic-bezier(0.23, 1, 0.32, 1);
    }
    #book-btn:hover { background: rgba(79,195,247,0.22); border-color: var(--accent); transform: scale(1.03); }
    #book-btn:active { transform: scale(0.97); }

    /* ── Identify card ── */
    #identify-card {
      position: fixed;
      bottom: 220px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 520px;
      z-index: 15;
      background: rgba(0,13,24,0.88);
      border: 1px solid rgba(79,195,247,0.35);
      border-radius: 16px;
      padding: 16px 18px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none;
      flex-direction: column;
      gap: 10px;
      animation: msg-in 0.25s cubic-bezier(0.23, 1, 0.32, 1);
    }
    #identify-card.visible { display: flex; }
    #identify-card p { font-size: 0.85rem; color: rgba(255,255,255,0.85); line-height: 1.5; }
    #identify-fields { display: flex; gap: 8px; }
    .id-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(79,195,247,0.2);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--fg);
      outline: none;
      transition: border-color 0.2s;
    }
    .id-input::placeholder { color: rgba(255,255,255,0.35); }
    .id-input:focus { border-color: var(--accent); }
    #identify-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .id-btn {
      padding: 7px 16px;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }
    .id-btn.primary { background: var(--accent); color: #000d18; }
    .id-btn.primary:hover { background: #7dd3fc; }
    .id-btn.skip { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.12); }
    .id-btn.skip:hover { color: var(--fg); border-color: rgba(255,255,255,0.3); }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      #logo { font-size: 1.1rem; }
      #bottom-ui { padding: 0 14px 44px; }
      #conversation { bottom: 210px; max-height: 200px; }
      #text-input { font-size: 0.85rem; padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <div id="portrait"></div>
  <div id="overlay"></div>

  <header id="header">
    <div id="logo">i<span>V</span>enture</div>
  </header>

  <!-- Book a Call CTA (top right) -->
  <div id="book-cta">
    <div id="status-dot"></div>
    <a id="book-btn" href="mailto:hello@iventure.studio?subject=Book%20a%20call%20with%20iVenture%20Studio" target="_blank">Book a Call</a>
  </div>

  <!-- Identify card -->
  <div id="identify-card">
    <p>Mind sharing your name and email? I'll have someone from iVenture Studio follow up with you directly.</p>
    <div id="identify-fields">
      <input class="id-input" id="id-name" type="text" placeholder="Your name" autocomplete="name" />
      <input class="id-input" id="id-email" type="email" placeholder="Email address" autocomplete="email" />
    </div>
    <div id="identify-actions">
      <button class="id-btn skip" id="id-skip">Maybe later</button>
      <button class="id-btn primary" id="id-submit">Send &#8594;</button>
    </div>
  </div>

  <!-- Conversation history -->
  <div id="conversation"></div>

  <div id="bottom-ui">
    <!-- Text input + mic row -->
    <div id="input-row">
      <input id="text-input" type="text" placeholder="Ask Velorah anything…" autocomplete="off" />
      <button id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <button id="mic-btn" aria-label="Speak to Velorah">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
    </div>
    <div id="hint">Type or tap the mic to talk to Velorah</div>
  </div>

  <div id="contact">
    <a href="mailto:hello@iventure.studio">hello@iventure.studio</a>
    <span style="color:rgba(255,255,255,0.15)">·</span>
    <a href="https://os.gummi.lt" target="_blank">iVenture OS</a>
  </div>

  <script>
    // ── Config ──
    // All LLM calls go through the OS dashboard server — API key never in browser
    const OS_API = 'https://os.gummi.lt/api/trpc/publicChat.send';
    const OS_IDENTIFY_API = 'https://os.gummi.lt/api/trpc/publicChat.identify';
    const SESSION_ID = 'session-' + Math.random().toString(36).slice(2, 10) + '-' + Date.now();

    // ── State ──
    let isListening = false;
    let isSpeaking = false;
    let isThinking = false;
    let recognition = null;
    let currentAudio = null;
    let chatHistory = [];
    let thinkingEl = null;
    let userMessageCount = 0;
    let identifyShown = false;
    let identified = false;

    // ── Elements ──
    const micBtn = document.getElementById('mic-btn');
    const sendBtn = document.getElementById('send-btn');
    const textInput = document.getElementById('text-input');
    const conversation = document.getElementById('conversation');
    const hint = document.getElementById('hint');
    const identifyCard = document.getElementById('identify-card');
    const idName = document.getElementById('id-name');
    const idEmail = document.getElementById('id-email');
    const idSkip = document.getElementById('id-skip');
    const idSubmit = document.getElementById('id-submit');

    // ── Conversation helpers ──
    function addMessage(role, text) {
      if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
      const el = document.createElement('div');
      el.className = 'msg ' + (role === 'user' ? 'user' : 'agent');
      el.textContent = text;
      conversation.appendChild(el);
      conversation.scrollTop = conversation.scrollHeight;
      return el;
    }
    function showThinking() {
      if (thinkingEl) return;
      thinkingEl = document.createElement('div');
      thinkingEl.className = 'msg thinking';
      thinkingEl.textContent = 'Velorah is thinking…';
      conversation.appendChild(thinkingEl);
      conversation.scrollTop = conversation.scrollHeight;
    }

    // ── UI state helpers ──
    function setListening(v) {
      isListening = v;
      micBtn.classList.toggle('listening', v);
      hint.textContent = v ? 'Listening…' : (isThinking ? 'Thinking…' : 'Type or tap the mic to talk to Velorah');
    }
    function setSpeaking(v) {
      isSpeaking = v;
      micBtn.classList.toggle('speaking', v);
    }
    function setThinking(v) {
      isThinking = v;
      sendBtn.disabled = v;
      textInput.disabled = v;
      if (v) showThinking();
      hint.textContent = v ? 'Thinking…' : 'Type or tap the mic to talk to Velorah';
    }

    // ── Send message to OS backend ──
    async function sendMessage(userText) {
      if (isThinking || !userText.trim()) return;
      const text = userText.trim();
      textInput.value = '';
      addMessage('user', text);
      setThinking(true);
      userMessageCount++;

      try {
        const res = await fetch(OS_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            json: {
              sessionId: SESSION_ID,
              message: text,
              history: chatHistory.slice(-12), // send last 12 turns for context
            }
          })
        });
        const data = await res.json();
        const reply = data?.result?.data?.json?.content
          || "I'm having trouble connecting right now. Please email hello@iventure.studio.";
        chatHistory.push({ role: 'user', content: text });
        chatHistory.push({ role: 'assistant', content: reply });
        setThinking(false);
        addMessage('agent', reply);
        speak(reply);
        // Show identify card after 3 user messages (once only)
        if (userMessageCount >= 3 && !identifyShown && !identified) {
          identifyShown = true;
          setTimeout(() => identifyCard.classList.add('visible'), 900);
        }
      } catch (err) {
        setThinking(false);
        if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
        addMessage('agent', 'Connection issue. Please try again or email hello@iventure.studio.');
      }
    }

    // ── TTS (browser built-in) ──
    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95;
      utter.pitch = 1.0;
      // Prefer a female English voice if available
      const voices = window.speechSynthesis.getVoices();
      const preferred = voices.find(v => /female|samantha|karen|moira|victoria|zira/i.test(v.name))
        || voices.find(v => v.lang.startsWith('en'));
      if (preferred) utter.voice = preferred;
      setSpeaking(true);
      utter.onend = () => setSpeaking(false);
      utter.onerror = () => setSpeaking(false);
      window.speechSynthesis.speak(utter);
    }

    // ── Speech Recognition ──
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onstart = () => setListening(true);
      recognition.onend = () => setListening(false);
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        if (text.trim()) sendMessage(text.trim());
      };
      recognition.onerror = (e) => {
        setListening(false);
        if (e.error !== 'no-speech') addMessage('agent', 'Could not hear you. Try again or type your message.');
      };
    }

    // ── Event listeners ──
    sendBtn.addEventListener('click', () => sendMessage(textInput.value));
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(textInput.value); }
    });
    micBtn.addEventListener('click', () => {
      if (isSpeaking) {
        window.speechSynthesis.cancel();
        setSpeaking(false);
        return;
      }
      if (isListening) {
        recognition?.stop();
        return;
      }
      if (!SpeechRecognition) {
        addMessage('agent', 'Voice input is not supported in this browser. Please type your message below.');
        return;
      }
      recognition.start();
    });

    // ── Identify card handlers ──
    idSkip.addEventListener('click', () => {
      identifyCard.classList.remove('visible');
      identified = true;
    });
    idSubmit.addEventListener('click', async () => {
      const name = idName.value.trim();
      const email = idEmail.value.trim();
      identifyCard.classList.remove('visible');
      identified = true;
      if (name || email) {
        try {
          await fetch(OS_IDENTIFY_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ json: { sessionId: SESSION_ID, name, email } })
          });
        } catch (_) {}
        addMessage('agent', `Thanks${name ? ', ' + name : ''}! Someone from iVenture Studio will be in touch${email ? ' at ' + email : ''} soon.`);
      }
    });

    // ── Greeting on load ──
    setTimeout(() => {
      addMessage('agent', "Hello, I'm Velorah — the iVenture Studio AI. Ask me anything about our services, or tell me what you're building.");
    }, 800);
  </script>
</body>
</html>
