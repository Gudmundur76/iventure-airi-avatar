<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Velorah — iVenture Studio AI</title>
  <meta name="description" content="Talk to Velorah, the iVenture Studio AI agent. Voice-powered, always available." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000d18;
      --fg: #ffffff;
      --muted: rgba(255,255,255,0.5);
      --accent: #4fc3f7;
      --accent-dim: rgba(79,195,247,0.15);
      --accent-glow: rgba(79,195,247,0.4);
      --font-display: 'Instrument Serif', serif;
      --font-body: 'Inter', sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Portrait Background ── */
    #portrait {
      position: fixed;
      inset: 0;
      background-image: url('https://os.gummi.lt/manus-storage/gummi_avatar_hero_2620b055.png');
      background-size: cover;
      background-position: center top;
      z-index: 0;
    }

    /* ── Dark gradient overlay so UI is readable ── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0,13,24,0.3) 0%, rgba(0,13,24,0.0) 30%, rgba(0,13,24,0.0) 50%, rgba(0,13,24,0.85) 75%, rgba(0,13,24,0.97) 100%),
        linear-gradient(to right, rgba(0,13,24,0.4) 0%, transparent 40%, transparent 60%, rgba(0,13,24,0.4) 100%);
      pointer-events: none;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #logo {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.02em;
      color: var(--fg);
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    #logo span { color: var(--accent); }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Bottom UI ── */
    #bottom-ui {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 24px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ── Transcript ── */
    #transcript {
      width: 100%;
      max-width: 520px;
      min-height: 48px;
      text-align: center;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--fg);
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    #transcript.visible { opacity: 1; }
    #transcript .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 4px;
    }
    #transcript .text {
      color: var(--fg);
    }
    #transcript.agent .text { color: var(--accent); }

    /* ── Waveform ── */
    #waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 28px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #waveform.active { opacity: 1; }
    #waveform .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      animation: wave 1.2s ease-in-out infinite;
    }
    #waveform .bar:nth-child(1) { animation-delay: 0s; height: 8px; }
    #waveform .bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
    #waveform .bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
    #waveform .bar:nth-child(4) { animation-delay: 0.15s; height: 20px; }
    #waveform .bar:nth-child(5) { animation-delay: 0.05s; height: 12px; }
    #waveform .bar:nth-child(6) { animation-delay: 0.25s; height: 18px; }
    #waveform .bar:nth-child(7) { animation-delay: 0.1s; height: 10px; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    /* ── Mic Button ── */
    #mic-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1.5px solid rgba(79,195,247,0.4);
      background: rgba(0,13,24,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 0 24px rgba(79,195,247,0.1), inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
    }
    #mic-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 32px var(--accent-glow), inset 0 1px 1px rgba(255,255,255,0.15);
      transform: scale(1.05);
    }
    #mic-btn:active { transform: scale(0.96); }
    #mic-btn.listening {
      border-color: var(--accent);
      background: rgba(79,195,247,0.12);
      box-shadow: 0 0 48px var(--accent-glow), 0 0 80px rgba(79,195,247,0.15), inset 0 1px 1px rgba(255,255,255,0.2);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }
    #mic-btn.speaking {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.12);
      box-shadow: 0 0 48px rgba(167,139,250,0.4), inset 0 1px 1px rgba(255,255,255,0.2);
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 48px var(--accent-glow), 0 0 80px rgba(79,195,247,0.15), inset 0 1px 1px rgba(255,255,255,0.2); }
      50% { box-shadow: 0 0 64px var(--accent-glow), 0 0 120px rgba(79,195,247,0.25), inset 0 1px 1px rgba(255,255,255,0.2); }
    }
    #mic-btn svg { width: 28px; height: 28px; }
    #mic-btn.listening svg { color: var(--accent); }
    #mic-btn.speaking svg { color: #a78bfa; }

    /* ── Hint ── */
    #hint {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Contact strip ── */
    #contact {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 20px;
      align-items: center;
    }
    #contact a {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    #contact a:hover { color: var(--accent); }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      #logo { font-size: 1.1rem; }
      #bottom-ui { padding: 0 16px 56px; }
      #mic-btn { width: 64px; height: 64px; }
      #transcript { font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <div id="portrait"></div>
  <div id="overlay"></div>

  <header id="header">
    <div id="logo">i<span>V</span>enture</div>
    <div id="status-dot"></div>
  </header>

  <div id="bottom-ui">
    <div id="transcript">
      <div class="label"></div>
      <div class="text"></div>
    </div>

    <div id="waveform">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <button id="mic-btn" aria-label="Speak to Velorah">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>

    <div id="hint">Tap to speak</div>
  </div>

  <div id="contact">
    <a href="mailto:hello@iventure.studio">hello@iventure.studio</a>
    <span style="color:rgba(255,255,255,0.2)">·</span>
    <a href="https://os.gummi.lt" target="_blank">iVenture OS</a>
  </div>

  <script>
    // ── Config ──
    const NEXOS_URL = 'https://api.nexos.ai/v1/chat/completions';
    const NEXOS_KEY = 'nexos-team-071780a05f6522ccb86b3dc090ae3212dfc68e1e8d8c5a687cc4322377208a65c36ebba9a71f8e2a93ddf26b82608f1b7b8be1716f812ad53810ee4fb9e5d1fa';
    const MODEL = 'grok-4-20251120';
    const SYSTEM_PROMPT = `You are Velorah, the AI agent for iVenture Studio — a creative technology studio based in Iceland. You are warm, direct, and knowledgeable about AI, technology, and business. Keep responses concise (2-3 sentences max) and conversational. The founder is Guðmundur (Gummi), an Icelandic entrepreneur.`;

    // ── State ──
    let isListening = false;
    let isSpeaking = false;
    let recognition = null;
    let currentAudio = null;
    const history = [{ role: 'system', content: SYSTEM_PROMPT }];

    // ── Elements ──
    const micBtn = document.getElementById('mic-btn');
    const transcript = document.getElementById('transcript');
    const transcriptLabel = transcript.querySelector('.label');
    const transcriptText = transcript.querySelector('.text');
    const waveform = document.getElementById('waveform');
    const hint = document.getElementById('hint');

    // ── UI helpers ──
    function showTranscript(label, text, isAgent = false) {
      transcriptLabel.textContent = label;
      transcriptText.textContent = text;
      transcript.classList.add('visible');
      transcript.classList.toggle('agent', isAgent);
    }
    function hideTranscript() {
      transcript.classList.remove('visible');
    }
    function setListening(v) {
      isListening = v;
      micBtn.classList.toggle('listening', v);
      waveform.classList.toggle('active', v);
      hint.textContent = v ? 'Listening…' : 'Tap to speak';
    }
    function setSpeaking(v) {
      isSpeaking = v;
      micBtn.classList.toggle('speaking', v);
    }

    // ── Speech Recognition ──
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => setListening(true);
      recognition.onend = () => { if (isListening) setListening(false); };

      recognition.onresult = (e) => {
        const result = e.results[e.results.length - 1];
        const text = result[0].transcript;
        showTranscript('You', text, false);
        if (result.isFinal && text.trim()) {
          setListening(false);
          sendMessage(text.trim());
        }
      };

      recognition.onerror = (e) => {
        setListening(false);
        if (e.error !== 'no-speech') showTranscript('Error', 'Could not hear you. Try again.', false);
      };
    }

    // ── LLM ──
    async function sendMessage(userText) {
      history.push({ role: 'user', content: userText });
      showTranscript('Thinking…', '…', true);
      setSpeaking(false);

      try {
        const res = await fetch(NEXOS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${NEXOS_KEY}` },
          body: JSON.stringify({ model: MODEL, messages: history, max_tokens: 200, temperature: 0.7 })
        });
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || 'I had trouble responding. Please try again.';
        history.push({ role: 'assistant', content: reply });
        showTranscript('Velorah', reply, true);
        speak(reply);
      } catch (err) {
        showTranscript('Error', 'Connection issue. Please try again.', true);
      }
    }

    // ── TTS via xAI ──
    async function speak(text) {
      setSpeaking(true);
      try {
        const res = await fetch('https://api.x.ai/v1/audio/speech', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${window.__XAI_KEY__ || ''}` },
          body: JSON.stringify({ model: 'grok-2-audio', input: text, voice: 'sage' })
        });
        if (!res.ok) throw new Error('TTS failed');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        if (currentAudio) { currentAudio.pause(); URL.revokeObjectURL(currentAudio.src); }
        currentAudio = new Audio(url);
        currentAudio.onended = () => { setSpeaking(false); URL.revokeObjectURL(url); };
        currentAudio.play();
      } catch {
        // Fallback to browser TTS
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.95;
        utter.pitch = 1.0;
        utter.onend = () => setSpeaking(false);
        window.speechSynthesis.speak(utter);
      }
    }

    // ── Mic button ──
    micBtn.addEventListener('click', () => {
      if (isSpeaking) {
        // Stop speaking
        if (currentAudio) { currentAudio.pause(); setSpeaking(false); }
        window.speechSynthesis.cancel();
        setSpeaking(false);
        return;
      }
      if (isListening) {
        recognition?.stop();
        setListening(false);
        return;
      }
      if (!SpeechRecognition) {
        showTranscript('Notice', 'Voice input not supported in this browser. Try Chrome or Safari.', false);
        return;
      }
      hideTranscript();
      recognition.start();
    });

    // ── Greeting on load ──
    setTimeout(() => {
      const greeting = "Hello, I'm Velorah — the iVenture Studio AI. How can I help you today?";
      showTranscript('Velorah', greeting, true);
      speak(greeting);
    }, 1200);
  </script>
</body>
</html>
